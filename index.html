<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>糖糖生日快乐 · 锐锐一直在</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      font-family: 'Segoe UI', '华文行楷', 'KaiTi', 'cursive', sans-serif;
      background-color: #ffc0cb;
      width: 100vw;
      height: 100vh;
      position: fixed;
      touch-action: none;
    }

    .scene {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transition: opacity 0.6s ease;
      opacity: 0;
      pointer-events: none;
    }

    .scene.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* 场景1 */
    #scene1 {
      background-color: #ffb7c5;
      z-index: 10;
    }

    #sakuraCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 11;
    }

    /* 倒计时粒子容器 */
    .countdown-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(60vw, 60vh);
      height: min(60vw, 60vh);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.9));
    }

    #particleCanvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 30px;
      background-color: rgba(255, 200, 220, 0.15);
    }

    /* 场景2 */
    #scene2 {
      background-color: #ffc0cb;
      z-index: 5;
    }

    .big-message {
      font-size: clamp(2.2rem, 15vw, 5rem);
      color: #a5385b;
      text-shadow: 3px 3px 0 #ffb3c6, 6px 6px 20px rgba(255, 240, 245, 0.8);
      font-weight: 800;
      letter-spacing: 4px;
      animation: softGlow 2s infinite alternate;
      text-align: center;
      padding: 20px;
      word-break: keep-all;
    }

    @keyframes softGlow {
      from { text-shadow: 2px 2px 10px #ffe4ed, 0 0 20px #ffb3c6; }
      to { text-shadow: 6px 6px 20px #ff9eb5, 0 0 40px #ffd9e2; }
    }

    /* ===== 场景3 : 超逼真草莓蛋糕 ===== */
    #scene3 {
      background: linear-gradient(145deg, #ffdbdb, #ffb6c1);
      z-index: 4;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    .cake-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      height: 65vh;
      min-height: 450px;
      position: relative;
      padding-top: 20px;
      transform: translateY(-2%);
    }

    .cake-stack {
      display: flex;
      flex-direction: column-reverse;
      align-items: center;
      justify-content: flex-end;
      width: 100%;
      height: 100%;
      gap: 8px;
      position: relative;
    }

    /* 蛋糕层 - 超逼真效果 */
    .cake-layer {
      background: #f8d7aa;  /* 蛋糕胚底色 */
      border: none;
      border-radius: 60px 60px 30px 30px;
      box-shadow: 0 10px 0 #c27e6b, 0 20px 25px rgba(0,0,0,0.3);
      width: var(--layer-width);
      height: var(--layer-height);
      min-height: 60px;
      background: linear-gradient(145deg, #f9e0c0, #e6b78b);  /* 烤面包色泽 */
      position: relative;
      transition: all 0.2s;
      /* 蛋糕孔纹理 */
      background-image: radial-gradient(circle at 20% 30%, #dba578 3px, transparent 4px),
      radial-gradient(circle at 60% 70%, #dba578 2px, transparent 3px),
      radial-gradient(circle at 80% 40%, #dba578 3px, transparent 4px);
      background-size: 50px 50px, 40px 40px, 60px 60px;
      overflow: visible;
    }

    /* 奶油霜涂层 */
    .cake-layer::before {
      content: '';
      position: absolute;
      top: -12px;
      left: -2px;
      width: calc(100% + 4px);
      height: 30px;
      background: linear-gradient(180deg, #fff9f0, #ffe0d0);
      border-radius: 70px 70px 40px 40px;
      box-shadow: 0 4px 8px rgba(210, 130, 120, 0.3);
      filter: blur(1px);
      z-index: 5;
    }

    /* 滴落的奶油 */
    .cream-drip {
      position: absolute;
      bottom: -8px;
      left: 10%;
      width: 15px;
      height: 20px;
      background: #fff2e0;
      border-radius: 50%;
      filter: blur(3px);
      box-shadow: 20px -2px 0 #fff2e0, 40px 2px 0 #fff2e0, 60px -3px 0 #fff2e0, 80px 1px 0 #fff2e0;
      opacity: 0.8;
      z-index: 4;
    }

    /* 巧克力淋面 */
    .chocolate-drip {
      position: absolute;
      bottom: -5px;
      left: 15%;
      width: 12px;
      height: 25px;
      background: #8b5a2b;
      border-radius: 40% 40% 30% 30%;
      filter: blur(2px);
      box-shadow: 30px -5px 0 #8b5a2b, 55px 3px 0 #8b5a2b, 75px -2px 0 #8b5a2b;
      opacity: 0.7;
      z-index: 6;
    }

    /* 草莓 - 完整草莓 */
    .strawberry-whole {
      position: absolute;
      width: 32px;
      height: 36px;
      background: #e63e4e;
      border-radius: 60% 60% 45% 45%;
      top: -20px;
      box-shadow: 0 8px 0 #aa2f3a, 0 8px 12px rgba(0,0,0,0.25);
      z-index: 20;
    }
    .strawberry-whole::before {
      content: '';
      position: absolute;
      width: 6px;
      height: 6px;
      background: #fcf5d8;
      border-radius: 50%;
      top: 8px;
      left: 8px;
      box-shadow: 10px 5px 0 #fcf5d8, 5px 12px 0 #fcf5d8;
    }
    .strawberry-whole::after {
      content: '';
      position: absolute;
      top: -10px;
      left: 10px;
      width: 12px;
      height: 16px;
      background: #2e7d32;
      border-radius: 60% 60% 0 0;
      transform: rotate(5deg);
    }

    /* 草莓切片 */
    .strawberry-slice {
      position: absolute;
      width: 28px;
      height: 28px;
      background: #e63946;
      border-radius: 50%;
      top: -12px;
      box-shadow: 0 4px 0 #a12532, 0 6px 10px rgba(0,0,0,0.2);
      z-index: 19;
      overflow: hidden;
    }
    .strawberry-slice::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 30%, #fff0b5 4px, transparent 5px),
      radial-gradient(circle at 70% 60%, #fff0b5 3px, transparent 4px);
    }
    .strawberry-slice::after {
      content: '';
      position: absolute;
      top: -4px;
      left: 8px;
      width: 6px;
      height: 10px;
      background: #2e7d32;
      border-radius: 40% 40% 0 0;
    }

    /* 蓝莓装饰 */
    .blueberry {
      position: absolute;
      width: 16px;
      height: 16px;
      background: #2c3e50;
      border-radius: 50%;
      top: -8px;
      box-shadow: 0 3px 0 #1a2632, 0 4px 6px rgba(0,0,0,0.3);
      z-index: 18;
    }
    .blueberry::before {
      content: '';
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ecf0f1;
      border-radius: 50%;
      top: 4px;
      left: 5px;
    }

    /* 薄荷叶 */
    .mint-leaf {
      position: absolute;
      width: 14px;
      height: 20px;
      background: #2ecc71;
      border-radius: 80% 0 80% 0;
      top: -18px;
      transform: rotate(35deg);
      box-shadow: 0 3px 5px rgba(0,0,0,0.1);
      z-index: 22;
    }

    /* 蜡烛 - 更逼真 */
    .candle-area {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 5px;
      position: relative;
      top: -20px;
      z-index: 30;
    }

    .candle {
      width: 28px;
      height: 100px;
      background: linear-gradient(145deg, #ffb6c1, #ff9eb5);
      border-radius: 14px 14px 8px 8px;
      border: 2px solid #f2849e;
      box-shadow: 0 12px 0 #b35d7a, 0 15px 20px rgba(0,0,0,0.3);
      position: relative;
    }

    .candle::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 6px;
      width: 8px;
      height: 40px;
      background: rgba(255, 255, 240, 0.5);
      border-radius: 20%;
      filter: blur(4px);
    }

    /* 烛泪 */
    .candle-wax {
      position: absolute;
      bottom: 20px;
      left: 5px;
      width: 6px;
      height: 15px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 40%;
      filter: blur(2px);
      box-shadow: 10px 5px 0 rgba(255, 255, 255, 0.5);
    }

    .flame {
      position: absolute;
      top: -45px;
      left: 4px;
      width: 26px;
      height: 50px;
      background: radial-gradient(circle at 40% 30%, #fff9b0, #ff8c42, #e67e22);
      border-radius: 60% 40% 40% 60%;
      filter: blur(4px) drop-shadow(0 0 15px #ffae42);
      animation: flicker 0.15s infinite alternate;
      transform-origin: bottom;
    }
    .flame::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 6px;
      width: 14px;
      height: 20px;
      background: #ffdd88;
      border-radius: 50%;
      filter: blur(5px);
    }

    @keyframes flicker {
      0% { transform: scale(1) translateY(0); opacity: 1; filter: blur(4px); }
      100% { transform: scale(1.2) translateY(-6px); opacity: 0.95; filter: blur(5px); }
    }

    /* 糖粉撒落效果 */
    .sugar-dust {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, white 1px, transparent 1px);
      background-size: 20px 20px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 40;
    }

    .handwriting-block {
      text-align: center;
      margin-top: 25px;
      width: 100%;
    }

    .handwriting-hbd {
      font-family: 'KaiTi', '华文楷体', 'Bradley Hand', 'Brush Script MT', cursive;
      font-size: clamp(2rem, 9vw, 4.5rem);
      color: #972b50;
      text-shadow: 3px 3px 0 #ffc2c9, 1px 1px 15px white;
      letter-spacing: 4px;
      transform: rotate(-1deg);
      opacity: 0;
      animation: fadeInUp 0.8s ease forwards 0.2s;
      margin-bottom: 8px;
      background: rgba(255, 250, 240, 0.3);
      border-radius: 60px;
      padding: 8px 20px;
      display: inline-block;
      backdrop-filter: blur(4px);
      line-height: 1.3;
    }

    .handwriting-message {
      font-family: 'KaiTi', '华文楷体', 'Bradley Hand', 'Brush Script MT', cursive;
      text-align: center;
      line-height: 1.8;
      font-size: clamp(2rem, 8vw, 4.2rem);
      color: #601f3b;
      text-shadow: 3px 3px 0 #ffcfcf, 1px 1px 10px white;
      letter-spacing: 3px;
      transform: rotate(-1deg);
      opacity: 0;
      animation: fadeInUp 1s ease forwards 0.5s;
      width: 100%;
      background: rgba(255,255,240,0.2);
      border-radius: 100px;
      padding: 10px 0;
      backdrop-filter: blur(4px);
    }

    .handwriting-message .sub {
      font-size: 0.65em;
      color: #831d46;
      margin-top: 10px;
      opacity: 0.9;
    }

    .corner-love {
      position: absolute;
      bottom: 20px;
      right: 25px;
      font-size: clamp(1rem, 5vw, 2.2rem);
      font-family: 'KaiTi', '华文楷体', 'Apple Color Emoji', sans-serif;
      color: #ad1457;
      background-color: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      padding: 10px 25px;
      border-radius: 60px;
      box-shadow: 0 0 30px #ffb6c1;
      opacity: 0;
      animation: fadeIn 1.8s ease forwards 1.5s;
      z-index: 50;
      letter-spacing: 3px;
      border: 2px solid white;
      white-space: nowrap;
      font-weight: bold;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 600px) {
      .cake-layer {
        min-height: 50px;
      }
      .candle {
        width: 22px;
        height: 80px;
      }
      .flame {
        width: 20px;
        height: 40px;
        left: 1px;
        top: -38px;
      }
      .handwriting-hbd {
        font-size: 2.2rem;
        padding: 5px 15px;
      }
      .strawberry-whole, .strawberry-slice {
        width: 24px;
        height: 26px;
      }
    }
  </style>
</head>
<body>

<!-- 场景1：樱花 + 粒子倒计时 -->
<div id="scene1" class="scene active">
  <canvas id="sakuraCanvas"></canvas>
  <div class="countdown-container">
    <canvas id="particleCanvas"></canvas>
  </div>
</div>

<!-- 场景2：祝糖糖生日快乐 -->
<div id="scene2" class="scene">
  <div class="big-message">祝糖糖生日快乐！</div>
</div>

<!-- 场景3：超逼真草莓蛋糕 -->
<div id="scene3" class="scene">
  <div class="cake-wrapper">
    <div class="cake-stack">
      <!-- 底层最大 - 加各种装饰 -->
      <div class="cake-layer" style="--layer-width: 94%; --layer-height: 110px;">
        <div class="cream-drip"></div>
        <div class="chocolate-drip"></div>
        <div class="strawberry-whole" style="left: 10%; top: -25px;"></div>
        <div class="strawberry-slice" style="left: 30%; top: -18px; transform: rotate(15deg);"></div>
        <div class="blueberry" style="left: 55%; top: -15px;"></div>
        <div class="mint-leaf" style="left: 75%; top: -22px; transform: rotate(45deg);"></div>
      </div>
      <!-- 第二层 -->
      <div class="cake-layer" style="--layer-width: 80%; --layer-height: 95px;">
        <div class="cream-drip" style="left: 5%;"></div>
        <div class="chocolate-drip" style="left: 25%;"></div>
        <div class="strawberry-slice" style="left: 15%; top: -16px;"></div>
        <div class="strawberry-whole" style="left: 45%; top: -22px;"></div>
        <div class="blueberry" style="left: 70%; top: -12px;"></div>
        <div class="mint-leaf" style="left: 85%; top: -20px;"></div>
      </div>
      <!-- 第三层 -->
      <div class="cake-layer" style="--layer-width: 66%; --layer-height: 80px;">
        <div class="cream-drip" style="left: 15%;"></div>
        <div class="strawberry-slice" style="left: 20%; top: -15px;"></div>
        <div class="strawberry-whole" style="left: 50%; top: -20px;"></div>
        <div class="blueberry" style="left: 75%; top: -10px;"></div>
      </div>
      <!-- 最上层 (带蜡烛) -->
      <div class="cake-layer" style="--layer-width: 50%; --layer-height: 75px; display: flex; justify-content: center; align-items: flex-end;">
        <div class="cream-drip" style="left: 20%;"></div>
        <div class="strawberry-slice" style="left: 15%; top: -18px; z-index: 25;"></div>
        <div class="strawberry-whole" style="left: 70%; top: -22px; z-index: 25;"></div>
        <div class="mint-leaf" style="left: 40%; top: -25px;"></div>
        <div class="candle-area">
          <div class="candle">
            <div class="candle-wax" style="left: 8px;"></div>
            <div class="flame"></div>
          </div>
          <div class="candle" style="height: 85px; background: linear-gradient(145deg, #f8c3cd, #ff9eb5);">
            <div class="candle-wax"></div>
            <div class="flame" style="height: 42px; width: 22px;"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- 糖粉装饰 -->
    <div class="sugar-dust"></div>
  </div>

  <div class="handwriting-block">
    <div class="handwriting-hbd">Happy birthday</div>
    <div class="handwriting-message">
      🍰 糖糖天天开心 🍰
      <div class="sub">锐锐一直在</div>
    </div>
  </div>
  <div class="corner-love">爱你❤️</div>
</div>

<script>
  (function() {
    // ---------- 樱花画布 ----------
    const sakuraCanvas = document.getElementById('sakuraCanvas');
    const sCtx = sakuraCanvas.getContext('2d');
    let width, height;
    let petals = [];

    function initCanvasSize() {
      width = window.innerWidth;
      height = window.innerHeight;
      sakuraCanvas.width = width;
      sakuraCanvas.height = height;
    }
    initCanvasSize();

    const PETAL_COUNT = Math.floor((width * height) / 12000);
    const finalPetalCount = Math.min(50, Math.max(18, PETAL_COUNT));

    class Petal {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 15 + 8;
        this.speedY = Math.random() * 1.2 + 0.6;
        this.speedX = Math.random() * 0.8 - 0.4;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotateSpeed = (Math.random() - 0.5) * 0.02;
        this.opacity = Math.random() * 0.6 + 0.3;
      }
      update() {
        this.y += this.speedY;
        this.x += this.speedX;
        this.rotation += this.rotateSpeed;
        if (this.y > height + 20) { this.y = -20; this.x = Math.random() * width; }
        if (this.x > width + 20) this.x = -20;
        if (this.x < -20) this.x = width + 20;
      }
      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.fillStyle = `rgba(255, 220, 230, ${this.opacity})`;
        ctx.shadowColor = 'rgba(255, 160, 180, 0.8)';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.ellipse(0, 0, this.size * 0.7, this.size * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function initPetals() {
      petals = [];
      for (let i = 0; i < finalPetalCount; i++) petals.push(new Petal());
    }
    initPetals();

    function animatePetals() {
      sCtx.clearRect(0, 0, width, height);
      petals.forEach(p => { p.update(); p.draw(sCtx); });
      requestAnimationFrame(animatePetals);
    }
    animatePetals();

    window.addEventListener('resize', () => {
      initCanvasSize();
      petals.forEach(p => { if (p.x > width) p.x = width * 0.2; if (p.y > height) p.y = height * 0.2; });
    });

    // ---------- 粒子倒计时 (保持不变) ----------
    const particleCanvas = document.getElementById('particleCanvas');
    const pCtx = particleCanvas.getContext('2d');
    let pWidth, pHeight;

    function resizeParticleCanvas() {
      const container = document.querySelector('.countdown-container');
      pWidth = container.clientWidth;
      pHeight = container.clientHeight;
      particleCanvas.width = pWidth;
      particleCanvas.height = pHeight;
    }
    resizeParticleCanvas();
    window.addEventListener('resize', resizeParticleCanvas);

    class Particle {
      constructor(x, y, targetX, targetY) {
        this.x = x;
        this.y = y;
        this.targetX = targetX;
        this.targetY = targetY;
        this.vx = 0;
        this.vy = 0;
        this.size = Math.random() * 5 + 4.5;
        const warmth = Math.random() * 20;
        this.baseColor = `rgb(${255}, ${255 - warmth}, ${240 - warmth})`;
      }
      update(phase) {
        const strength = 0.2;
        if (phase === 0) {
          this.vx += (Math.random() - 0.5) * 2.5;
          this.vy += (Math.random() - 0.5) * 2.5;
        } else {
          this.vx += (this.targetX - this.x) * strength;
          this.vy += (this.targetY - this.y) * strength;
        }
        this.vx *= 0.88;
        this.vy *= 0.88;
        this.x += this.vx;
        this.y += this.vy;
        if (this.x < -40) this.x = -40;
        if (this.x > pWidth + 40) this.x = pWidth + 40;
        if (this.y < -40) this.y = -40;
        if (this.y > pHeight + 40) this.y = pHeight + 40;
      }
      draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.baseColor;
        ctx.shadowColor = 'white';
        ctx.shadowBlur = 20;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x-1, this.y-1, this.size*0.4, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        ctx.shadowBlur = 15;
        ctx.fill();
      }
    }

    let particles = [];
    let phase = 1;
    let lastSwitch = performance.now();
    const SWITCH_INTERVAL = 1000;
    let countdownValue = 3;
    const scene1 = document.getElementById('scene1');
    const scene2 = document.getElementById('scene2');
    const scene3 = document.getElementById('scene3');

    const digitPatterns = {
      '3': [
        '000111111111000', '001111111111100', '011111111111110', '011111111111110', '111111111111111',
        '111110000011111', '111110000011111', '000000000011111', '000000000111110', '000000001111100',
        '000000001111100', '000000000111110', '000000000011111', '111110000011111', '111111111111111',
        '011111111111110', '011111111111110', '001111111111100', '000111111111000', '000000000000000'
      ],
      '2': [
        '000111111111000', '001111111111100', '011111111111110', '111111111111111', '111111111111111',
        '111110000011111', '111110000011111', '000000000011111', '000000000111110', '000000001111100',
        '000000011111000', '000000111110000', '000001111100000', '000011111000000', '111111111111111',
        '111111111111111', '111111111111111', '111111111111111', '111111111111111', '000000000000000'
      ],
      '1': [
        '000000111000000', '000001111100000', '000011111110000', '000111111111000', '000001111100000',
        '000001111100000', '000001111100000', '000001111100000', '000001111100000', '000001111100000',
        '000001111100000', '000001111100000', '000001111100000', '000001111100000', '111111111111111',
        '111111111111111', '011111111111110', '001111111111100', '000111111111000', '000000000000000'
      ]
    };

    function generateTargetPositions(digit) {
      const positions = [];
      const cols = 15, rows = 20;
      const cellW = pWidth / cols;
      const cellH = pHeight / rows;
      const pattern = digitPatterns[digit];
      if (!pattern) return positions;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (pattern[r] && pattern[r][c] === '1') {
            for (let i = 0; i < 3; i++) {
              const offsetX = 0.2 + Math.random() * 0.6;
              const offsetY = 0.2 + Math.random() * 0.6;
              const x = c * cellW + cellW * offsetX;
              const y = r * cellH + cellH * offsetY;
              positions.push({ x, y });
            }
          }
        }
      }
      return positions;
    }

    function initParticlesForDigit(digit) {
      const targets = generateTargetPositions(digit);
      particles = [];
      targets.forEach(t => {
        const x = pWidth/2 + (Math.random() - 0.5) * pWidth * 0.25;
        const y = pHeight/2 + (Math.random() - 0.5) * pHeight * 0.25;
        particles.push(new Particle(x, y, t.x, t.y));
      });
    }

    initParticlesForDigit('3');

    function startCountdown() {
      function animateParticles() {
        const now = performance.now();
        const elapsed = now - lastSwitch;
        if (elapsed >= SWITCH_INTERVAL) {
          lastSwitch = now;
          if (countdownValue > 1) {
            countdownValue--;
            phase = 0;
            setTimeout(() => {
              initParticlesForDigit(countdownValue.toString());
              phase = 1;
            }, 450);
          } else if (countdownValue === 1) {
            scene1.classList.remove('active');
            scene2.classList.add('active');
            setTimeout(() => {
              scene2.classList.remove('active');
              scene3.classList.add('active');
            }, 2500);
            return;
          }
        }
        pCtx.clearRect(0, 0, pWidth, pHeight);
        particles.forEach(p => {
          p.update(phase);
          p.draw(pCtx);
        });
        requestAnimationFrame(animateParticles);
      }
      animateParticles();
    }

    setTimeout(() => {
      lastSwitch = performance.now();
      startCountdown();
    }, 100);

    // 调整蛋糕高度
    function adjustCakeForSmall() {
      const layers = document.querySelectorAll('.cake-layer');
      if (window.innerHeight < 600) {
        layers.forEach((layer, index) => {
          if (index === 0) layer.style.height = '85px';
          else if (index === 1) layer.style.height = '75px';
          else if (index === 2) layer.style.height = '65px';
          else if (index === 3) layer.style.height = '60px';
        });
      } else {
        layers.forEach((layer, index) => {
          if (index === 0) layer.style.height = '110px';
          else if (index === 1) layer.style.height = '95px';
          else if (index === 2) layer.style.height = '80px';
          else if (index === 3) layer.style.height = '75px';
        });
      }
    }
    window.addEventListener('resize', adjustCakeForSmall);
    adjustCakeForSmall();
  })();
</script>
